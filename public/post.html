<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시글 - WATIL</title>
  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/common.css">
</head>
<body>
  <header class="header"><div class="header__inner"><a href="/" class="header__logo">WAT<span>IL</span></a><nav class="nav"><div class="nav__item"><a href="/company.html" class="nav__link">회사소개</a></div><div class="nav__item"><a href="#" class="nav__link">사업영역</a><div class="nav__dropdown"><a href="/business.html">사업 개요</a><a href="/solution.html">솔루션</a></div></div><div class="nav__item"><a href="#" class="nav__link">제품</a><div class="nav__dropdown"><a href="/product.html">제품 소개</a></div></div><div class="nav__item"><a href="#" class="nav__link">홍보센터</a><div class="nav__dropdown"><a href="/board.html?category=news">언론보도</a><a href="/board.html?category=notice">공지사항</a><a href="/board.html?category=case">도입사례</a></div></div><div class="nav__item"><a href="/inquiry.html" class="nav__link">도입문의</a></div></nav><button class="nav-toggle" aria-label="메뉴"><span></span><span></span><span></span></button></div></header>

  <div class="pt-header">
    <div class="container" style="max-width:800px;">
      <!-- Post Detail (loaded by JS) -->
      <div id="postDetail">
        <div style="text-align:center;padding:120px 0;color:var(--color-text-muted);">로딩 중...</div>
      </div>
    </div>
  </div>

  <footer class="footer"><div class="container"><div class="footer__inner"><div><div class="footer__brand">WAT<span>IL</span></div><p class="footer__desc">서울특별시 강남구 테헤란로 123, WATIL 빌딩 8층<br>TEL: 02-1234-5678 | Email: contact@watil.co.kr</p></div><div><h4 class="footer__heading">Company</h4><div class="footer__links"><a href="/company.html">회사소개</a><a href="/business.html">사업영역</a></div></div><div><h4 class="footer__heading">Product</h4><div class="footer__links"><a href="/product.html">제품 소개</a><a href="/board.html?category=case">도입사례</a></div></div><div><h4 class="footer__heading">Support</h4><div class="footer__links"><a href="/board.html?category=notice">공지사항</a><a href="/inquiry.html">도입문의</a></div></div></div><div class="footer__bottom">&copy; 2026 WATIL. All rights reserved.</div></div></footer>

  <script src="/js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      if (!id) { window.location.href = '/board.html'; return; }

      try {
        const post = await apiFetch(`/api/board/posts/${id}`);
        document.title = `${post.title} - WATIL`;

        document.getElementById('postDetail').innerHTML = `
          <div class="post-detail__header">
            <div class="post-detail__category">${post.category_name}</div>
            <h1 class="post-detail__title">${escapeHtml(post.title)}</h1>
            <div class="post-detail__meta">
              <span>${post.author}</span>
              <span>${formatDate(post.created_at)}</span>
              <span>조회 ${post.hit_count}</span>
            </div>
          </div>
          <div class="post-detail__content">${post.content}</div>
          <div class="post-nav">
            ${post.prev ? `<div class="post-nav__item"><span class="post-nav__label">이전글</span><a href="/post.html?id=${post.prev.id}">${escapeHtml(post.prev.title)}</a></div>` : ''}
            ${post.next ? `<div class="post-nav__item"><span class="post-nav__label">다음글</span><a href="/post.html?id=${post.next.id}">${escapeHtml(post.next.title)}</a></div>` : ''}
          </div>
          <div style="text-align:center;padding:32px 0;">
            <a href="/board.html?category=${post.category_slug}" class="btn btn--outline">목록으로</a>
          </div>
        `;
      } catch (err) {
        document.getElementById('postDetail').innerHTML = '<div style="text-align:center;padding:120px 0;color:#e53e3e;">게시글을 찾을 수 없습니다.</div>';
      }
    });

    function escapeHtml(str) {
      if (!str) return '';
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
